version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: clinical_etl_postgres
    environment:
      POSTGRES_DB: clinical_etl
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/aws/rds_init.sql:/docker-entrypoint-initdb.d/rds_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d clinical_etl"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: clinical_etl_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clinical-etl.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
