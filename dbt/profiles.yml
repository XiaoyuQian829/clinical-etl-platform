clinical_etl:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'admin123') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'clinical_etl') }}"
      schema: public
      threads: 4
