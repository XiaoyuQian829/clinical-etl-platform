version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - (cd frontend && npm ci --include=dev)
    build:
      commands:
        - (cd frontend && npm run build)
  artifacts:
    baseDirectory: frontend/.next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - frontend/node_modules/**/*
