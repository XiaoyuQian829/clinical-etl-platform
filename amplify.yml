version: 1
frontend:
  phases:
    preBuild:
      commands:
        - pwd
        - ls package.json package-lock.json 2>/dev/null || echo "no lockfile at root"
        - (cd frontend && pwd && ls package-lock.json && npm ci)
    build:
      commands:
        - (cd frontend && npm run build)
  artifacts:
    baseDirectory: frontend/.next
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
